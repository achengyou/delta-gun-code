name: Sync Daily Passwords

on:
  schedule:
    - cron: "5 16 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Sync daily passwords
        run: npm run sync:daily-passwords

      - name: Check daily password changes
        id: changes
        run: |
          if git diff --quiet -- data/daily-passwords.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "data/daily-passwords.json has no changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "data/daily-passwords.json changed."
          fi

      - name: Commit and push daily passwords
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/daily-passwords.json
          git commit -m "chore: sync daily passwords"
          git push
